<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML5 Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        header, footer {
            background: #333;
            color: #fff;
            padding: 10px 20px;
        }
        main {
            background: #fff;
            padding: 20px;
            margin-top: 10px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to HTML5</h1>
    </header>

    <main>
        <section>
            <h2>About</h2>
            <p>This is a simple HTML5 sample page.</p>
        </section>

        <section>
            <h2>Interactive Example</h2>
            <button onclick="sayHello()">Click Me</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>

    <script>
        function sayHello() {
            alert("Hello, HTML5!");
        }
    </script>

</body>
</html>
